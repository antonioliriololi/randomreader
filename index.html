<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sorteo - Psicología Organizacional v2</title>
<style>
  :root {
    --black: #0a0a0a;
    --white: #f8f8f8;
    --gray: #6b6b6b;
    --light: #e2e2e2;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: Arial, sans-serif;
    background: var(--white);
    color: var(--black);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    border-bottom: 2px solid var(--black);
    padding: 16px 28px;
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
  }
  .h-title { font-size: 14px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; }
  .h-sep   { color: var(--light); }
  .h-sub   { font-size: 12px; color: var(--gray); }
  .h-badge {
    margin-left: auto;
    background: var(--black); color: var(--white);
    font-size: 10px; font-weight: 700; letter-spacing: 0.12em;
    padding: 4px 10px; text-transform: uppercase;
  }

  main { flex: 1; padding: 24px 28px; max-width: 820px; width: 100%; margin: 0 auto; }
  .screen { display: none; }
  .screen.active { display: block; }

  .sec-label {
    font-size: 10px; font-weight: 700; letter-spacing: 0.16em;
    text-transform: uppercase; color: var(--gray);
    margin-bottom: 14px; padding-bottom: 8px; border-bottom: 1px solid var(--light);
  }

  /* LISTA */
  .controls-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
  .btn-sm {
    font-family: Arial, sans-serif; font-size: 11px; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase;
    border: 1.5px solid var(--black); background: transparent; color: var(--black);
    padding: 5px 14px; cursor: pointer; transition: all 0.12s;
  }
  .btn-sm:hover { background: var(--black); color: var(--white); }
  .chk-count { font-size: 12px; color: var(--gray); margin-left: auto; }
  .chk-count b { color: var(--black); }

  .student-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 5px;
    max-height: 390px; overflow-y: auto;
    border: 1.5px solid var(--light); padding: 10px; margin-bottom: 20px;
  }
  .student-grid::-webkit-scrollbar { width: 3px; }
  .student-grid::-webkit-scrollbar-thumb { background: var(--black); }

  .stu-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px; border: 1.5px solid transparent;
    cursor: pointer; transition: all 0.11s; user-select: none;
  }
  .stu-item:hover:not(.used) { border-color: var(--light); background: #f0f0f0; }
  .stu-item.checked { border-color: var(--black); background: #fff; }
  .stu-item.used { opacity: 0.26; cursor: default; }

  .chk-box {
    width: 15px; height: 15px; border: 2px solid var(--black); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 900;
  }
  .stu-item.checked .chk-box { background: var(--black); color: var(--white); }
  .stu-n    { font-size: 10px; color: var(--gray); min-width: 20px; text-align: right; }
  .stu-name { font-size: 12.5px; line-height: 1.25; }

  .btn-iniciar {
    font-family: Arial, sans-serif; font-size: 12px; font-weight: 700;
    letter-spacing: 0.18em; text-transform: uppercase;
    background: var(--black); color: var(--white); border: none;
    padding: 15px; cursor: pointer; display: block; width: 100%;
    transition: opacity 0.12s;
  }
  .btn-iniciar:hover { opacity: 0.8; }
  .btn-iniciar:disabled { opacity: 0.25; cursor: not-allowed; }

  /* PROGRESS */
  .prog-wrap { margin-bottom: 22px; }
  .prog-row  { display: flex; justify-content: space-between; font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gray); margin-bottom: 5px; }
  .prog-track { height: 2px; background: var(--light); }
  .prog-fill  { height: 2px; background: var(--black); transition: width 0.35s ease; }

  /* STUDENT BOX */
  .stu-box {
    border: 2px solid var(--black); padding: 22px 26px; margin-bottom: 24px;
    display: flex; align-items: center; gap: 20px;
  }
  .stu-bignum {
    font-size: 40px; font-weight: 900; line-height: 1; color: var(--gray);
    border-right: 2px solid var(--light); padding-right: 20px; min-width: 52px; text-align: center;
  }
  .stu-info { flex: 1; }
  .stu-tag  { font-size: 9px; font-weight: 700; letter-spacing: 0.16em; color: var(--gray); text-transform: uppercase; margin-bottom: 5px; }
  .stu-bigname { font-size: 21px; font-weight: 700; line-height: 1.15; text-transform: uppercase; letter-spacing: 0.02em; }
  .stu-pill {
    background: var(--black); color: var(--white);
    font-size: 9px; font-weight: 700; letter-spacing: 0.14em;
    padding: 4px 10px; text-transform: uppercase; align-self: flex-start; flex-shrink: 0;
  }

  /* DIFICULTAD */
  .diff-label {
    font-size: 10px; font-weight: 700; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--gray); margin-bottom: 14px;
  }
  .diff-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px;
  }
  .diff-btn {
    font-family: Arial, sans-serif;
    border: 2px solid var(--black); background: transparent;
    cursor: pointer; padding: 22px 12px;
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    transition: all 0.13s;
  }
  .diff-btn:hover { background: var(--black); color: var(--white); }
  .diff-btn:hover .d-sub, .diff-btn:hover .d-note { color: #aaa; }
  .d-name { font-size: 12px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; }
  .d-pts  { font-size: 32px; font-weight: 900; line-height: 1; margin: 4px 0; }
  .d-note { font-size: 9px; color: var(--gray); text-transform: uppercase; letter-spacing: 0.1em; }
  .d-sub  { font-size: 10px; color: var(--gray); margin-top: 2px; }

  /* PREGUNTA */
  .q-header { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; }
  .q-stu-name { font-size: 18px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.02em; }
  .q-diff-tag { border: 1.5px solid var(--black); font-size: 9px; font-weight: 700; letter-spacing: 0.1em; padding: 3px 9px; text-transform: uppercase; }
  .q-score    { margin-left: auto; background: var(--black); color: var(--white); font-size: 10px; font-weight: 700; letter-spacing: 0.1em; padding: 3px 10px; text-transform: uppercase; }

  .q-box { border: 2px solid var(--black); padding: 26px 28px; margin-bottom: 22px; }
  .q-meta {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--light);
  }
  .q-meta-label { font-size: 9px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: var(--gray); }
  .q-cap-badge  { border: 1.5px solid var(--black); font-size: 9px; font-weight: 700; letter-spacing: 0.1em; padding: 2px 8px; text-transform: uppercase; }
  .q-text { font-size: 15px; line-height: 1.72; }

  /* BOTONES */
  .btn-sig {
    font-family: Arial, sans-serif; font-size: 11px; font-weight: 700;
    letter-spacing: 0.14em; text-transform: uppercase;
    background: transparent; color: var(--black);
    border: 2px solid var(--black); padding: 14px;
    cursor: pointer; width: 100%; transition: all 0.12s; margin-bottom: 8px;
  }
  .btn-sig:hover { background: var(--black); color: var(--white); }
  .btn-back {
    font-family: Arial, sans-serif; font-size: 10px; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase;
    background: transparent; color: var(--gray);
    border: 1.5px solid var(--light); padding: 9px;
    cursor: pointer; width: 100%; transition: all 0.12s;
  }
  .btn-back:hover { border-color: var(--black); color: var(--black); }

  /* FIN */
  .fin-box { border: 2px solid var(--black); padding: 40px 28px; text-align: center; }
  .fin-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
  .fin-sub   { font-size: 13px; color: var(--gray); margin-bottom: 24px; }

  footer {
    border-top: 1px solid var(--light); padding: 12px 28px;
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 6px;
  }
  .fc { font-size: 11px; color: var(--gray); }
  .fc b { color: var(--black); }
  .fb { font-size: 10px; color: var(--gray); font-style: italic; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(7px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .anim { animation: fadeIn 0.27s ease forwards; }

  @media (max-width: 560px) {
    main { padding: 16px; }
    header { padding: 12px 16px; }
    .student-grid { grid-template-columns: 1fr; max-height: 300px; }
    .diff-grid { grid-template-columns: 1fr; }
    .stu-bigname { font-size: 16px; }
    .stu-bignum  { font-size: 28px; }
    .q-text { font-size: 13px; }
  }
</style>
</head>
<body>

<header>
  <div class="h-title">Psicol
